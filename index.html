<HTML>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bulma/1.0.4/css/bulma.min.css">
    <title> Search demo </title>

</head>

<body>
    <style>
        .custom {
            width: 100px !important;
        }
    </style>
    <br><br>
    <section>

        <div class="column is-10 is-offset-1">

            Your job is to find the number: <b><span id="needle"> </span></b> <br>

            Number of clicks so far: <span id="click_count">0</span> <br> <br>

            This array is <span id='sorted_message'> </span> <br> <br>

            <b><span id="congrats"> </span> </b><br> 

        </div><!-- /column-->
        <div class="column is-10 is-offset-1" id="button_container">
           <!-- DON'T DELETE ME! I'M SUPPOSED TO BE EMPTY!-->
        </div><!-- /column-->
        <div class="column is-10 is-offset-1">
            <div class='button' onclick="setup(false)" id="unsorted_button">
                    New unsorted array</div>
            <div class='button' onclick="setup(true)" id='sorted_button'>
                    New sorted array</div><br>
        </div><!-- /column-->
    </section>



<script>
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }


    haystack_size = 30
    needle = 0
    haystack = []

    sorted_message = "<b>sorted</b>. Try binary search!"
    unsorted_message = "<b>unsorted</b>. Linear search is your best bet."

    function setup(sort) {

        // Clean up information
        document.getElementById("congrats").innerHTML = ""
        document.getElementById("click_count").innerHTML = 0
        sorted_message_elem = document.getElementById("sorted_message")

        // Get a selection of numbers
        nums = Array.from(Array(haystack_size * 20).keys())
        shuffleArray(nums)
        haystack = nums.slice(0, haystack_size)

        // Sort the numbers if necessary, add sorted message
        if (sort) {
            haystack = haystack.sort(function(a, b) {
                return a - b
            })
            sorted_message_elem.innerHTML = sorted_message
        } else {
            sorted_message_elem.innerHTML = unsorted_message
        }

        // Choose a needle from the haystack
        needle = haystack[Math.floor(haystack_size * Math.random())];
        document.getElementById('needle').innerHTML = needle

        populate_buttons()

    }

    function populate_buttons() {
        button_container = document.getElementById('button_container')
        button_container.innerHTML = ""
        for (let i = 0; i < haystack_size; i++) {
            button = document.createElement("div");
            button.classList.add("button")
            button.classList.add("custom")
            button.id = "button_" + i
            button.onclick = function() {
                reveal(i)
            }
            button.innerHTML = i
            button_container.append(button)
        }

    }

    function reveal(index) {

        // Reveal number at index
        revealed_number = haystack[index]
        document.getElementById("button_" + index).innerHTML = revealed_number
        document.getElementById("button_" + index).classList.add("is-static")

        // Update click count
        click_count_elem = document.getElementById("click_count")
        click_count = parseInt(click_count_elem.innerHTML)
        click_count += 1
        click_count_elem.innerHTML = click_count

        if (revealed_number == needle) { // End search
            document.getElementById("congrats").innerHTML = "Done! You found " + needle + " in " + click_count + " clicks."

            // Blank out all buttons
            for (let i = 0; i < haystack_size; i++) {
                button = document.getElementById("button_" + i);
                if (button.classList.contains('is-static')) {} else {
                    button.innerHTML = "-"
                    button.classList.add('is-static')
                }
            }

        } else if (click_count == haystack_size) {
            // This shouldn't happen
            document.getElementById("congrats").innerHTML = needle + "was not in the array. "
        }
    }

    setup(false)

</script>

</body>

</HTML>
